extends: config_focused_runtime_base.yaml

feeds:
  - species_key: Cl2
    formula: Cl2
    display_name: Chlorine
  - species_key: HCl
    formula: HCl
    display_name: Hydrogen chloride
  - species_key: H2
    formula: H2
    display_name: Hydrogen

projectiles: [e-]

catalog_paths:
  - catalog_00_references.yaml
  - catalog_45_reactions_electron_attachment_chlorine.yaml
  - catalog_46_reactions_electron_ionization_chlorine.yaml
  - catalog_47_reactions_electron_dissociation_chlorine.yaml
  - catalog_48_reactions_radical_neutral_reaction_chlorine.yaml
  - catalog_67_reactions_ion_neutral_followup_chlorine.yaml
  - catalog_68_reactions_dissociative_recombination_chlorine.yaml

state_masters:
  - path: state_master_base.yaml
    families: [core_plasma, hydrogen, chlorine]

template_promotions:
  source_backed_templates:
    enabled: true
    source_systems: [qdb]
    target_families: [chlorine]
    allowed_reaction_families: [electron_dissociation, radical_neutral_reaction, ion_neutral_followup, dissociative_recombination]
    min_support_score: 0.82
    max_templates_per_family: 4
    require_catalog_species: true

limits:
  max_generation: 3
  beam_width: 48
  max_species: 80

bootstrap:
  reaction_evidence:
    sources:
      - kind: qdb_snapshot
        path: ../snapshots/qdb_halogen_fluorocarbon_template_promotion_snapshot.json
