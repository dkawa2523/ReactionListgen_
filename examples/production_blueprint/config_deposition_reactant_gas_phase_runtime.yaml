extends: config_focused_runtime_base.yaml

feeds:
  - species_key: NH3
    formula: NH3
    display_name: Ammonia
  - species_key: N2O
    formula: N2O
    display_name: Nitrous oxide
  - species_key: O3
    formula: O3
    display_name: Ozone
  - species_key: H2
    formula: H2
    display_name: Hydrogen
  - species_key: O2
    formula: O2
    display_name: Oxygen

projectiles: [e-]

catalog_paths:
  - catalog_00_references.yaml
  - catalog_32_reactions_electron_attachment_oxygen.yaml
  - catalog_33_reactions_electron_ionization_oxygen.yaml
  - catalog_34_reactions_electron_dissociation_oxygen.yaml
  - catalog_35_reactions_electron_excitation_oxygen.yaml
  - catalog_36_reactions_electron_ionization_nitrogen.yaml
  - catalog_37_reactions_electron_dissociation_nitrogen.yaml
  - catalog_38_reactions_electron_excitation_nitrogen.yaml
  - catalog_43_reactions_electron_ionization_gas_phase_targets.yaml
  - catalog_44_reactions_electron_attachment_gas_phase_targets.yaml
  - catalog_60_reactions_electron_dissociation_process_gases.yaml
  - catalog_61_reactions_ion_neutral_followup_process_gases.yaml
  - catalog_62_reactions_dissociative_recombination_process_gases.yaml

state_masters:
  - path: state_master_base.yaml
    families: [core_plasma, hydrogen, oxygen, nitrogen]

excited_state_registry_path: excited_state_registry.yaml

state_promotions:
  molecular_excited_states:
    enabled: true
    source_systems: [qdb, ideadb, vamdc]
    min_support_score: 0.84
    max_states_per_species: 3
    require_electron_signal: true

template_promotions:
  source_backed_templates:
    enabled: true
    source_systems: [qdb]
    target_families: [oxygen, nitrogen]
    allowed_reaction_families:
      [
        electron_attachment,
        electron_excitation,
        electron_ionization,
        electron_dissociation,
        ion_neutral_followup,
        dissociative_recombination,
      ]
    min_support_score: 0.84
    max_templates_per_family: 8
    require_catalog_species: true
  molecular_excited_state_templates:
    enabled: true
    source_systems: [qdb, ideadb, vamdc]
    target_families: [oxygen, nitrogen]
    min_support_score: 0.84
    include_electron_excitation: true
    include_radiative_relaxation: true
    include_collisional_quenching: true
    include_superelastic_deexcitation: true
    quenching_partners:
      oxygen: [O2, N2]
      nitrogen: [N2, O2]

limits:
  max_generation: 3
  beam_width: 80
  max_species: 128

bootstrap:
  reaction_evidence:
    sources:
      - kind: qdb_snapshot
        path: ../snapshots/qdb_multi_family_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_molecular_excited_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_process_precursor_template_promotion_snapshot.json
      - kind: vamdc_xsams
        path: ../snapshots/vamdc_ideadb_molecular_excitation_sample.xsams
        source_name: IDEADB molecular excitation sample
        source_system: ideadb
        support_score: 0.86
      - kind: vamdc_xsams
        path: ../snapshots/vamdc_molecular_excitation_sample.xsams
        source_name: VAMDC molecular excitation sample
        source_system: vamdc
        support_score: 0.84
