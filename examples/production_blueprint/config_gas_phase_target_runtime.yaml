projectiles: [e-]
libraries: []

catalog_paths:
  - catalog_00_references.yaml
  - catalog_26_reactions_electron_excitation_noble_gas.yaml
  - catalog_27_reactions_electron_ionization_noble_gas.yaml
  - catalog_32_reactions_electron_attachment_oxygen.yaml
  - catalog_33_reactions_electron_ionization_oxygen.yaml
  - catalog_36_reactions_electron_ionization_nitrogen.yaml
  - catalog_43_reactions_electron_ionization_gas_phase_targets.yaml
  - catalog_44_reactions_electron_attachment_gas_phase_targets.yaml
  - catalog_60_reactions_electron_dissociation_process_gases.yaml
  - catalog_61_reactions_ion_neutral_followup_process_gases.yaml
  - catalog_62_reactions_dissociative_recombination_process_gases.yaml
  - catalog_63_reactions_electron_dissociation_precursor_advanced.yaml
  - catalog_64_reactions_ion_neutral_followup_precursor_advanced.yaml
  - catalog_65_reactions_dissociative_recombination_precursor_advanced.yaml

state_masters:
  - path: state_master_base.yaml
    families:
      [
        core_plasma,
        noble_gas,
        hydrogen,
        oxygen,
        nitrogen,
        hydrocarbon,
        fluorocarbon,
        chlorine,
        bromine,
        boron,
        silicon,
        sulfur,
        tungsten,
        organosilicon,
      ]

state_filters:
  charge_window_min: -1
  charge_window_max: 1

limits:
  max_generation: 3
  beam_width: 96
  max_species: 240

conditions:
  electron_max_ev: 10000.0
  ion_max_ev: 200.0
  gas_temperature_k: 300.0

bootstrap:
  pubchem:
    enabled: false
  nist_asd:
    enabled: true
    export_paths:
      - ../snapshots/asd/H_I.csv
      - ../snapshots/asd/C_I.csv
      - ../snapshots/asd/C_II.csv
      - ../snapshots/asd/F_I.csv
      - ../snapshots/asd/O_I.csv
      - ../snapshots/asd/O_II.csv
      - ../snapshots/asd/N_I.csv
      - ../snapshots/asd/N_II.csv
      - ../snapshots/asd/Ar_I.csv
      - ../snapshots/asd/Ar_II.csv
    max_ion_charge: 1
    max_levels_per_spectrum: 3
  atct:
    enabled: false
  reaction_evidence:
    seed_templates: false
    sources: []
