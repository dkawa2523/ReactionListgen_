extends: config_focused_runtime_base.yaml

feeds:
  - species_key: Ar
    formula: Ar
    display_name: Argon
  - species_key: He
    formula: He
    display_name: Helium
  - species_key: N2
    formula: N2
    display_name: Nitrogen
  - species_key: H2
    formula: H2
    display_name: Hydrogen
  - species_key: O2
    formula: O2
    display_name: Oxygen
  - species_key: CF4
    formula: CF4
    display_name: Tetrafluoromethane
  - species_key: CHF3
    formula: CHF3
    display_name: Trifluoromethane
  - species_key: CH2F2
    formula: CH2F2
    display_name: Difluoromethane
  - species_key: CH3F
    formula: CH3F
    display_name: Fluoromethane
  - species_key: C2F6
    formula: C2F6
    display_name: Hexafluoroethane
  - species_key: c-C4F8
    formula: C4F8
    display_name: Octafluorocyclobutane
  - species_key: C5F8
    formula: C5F8
    display_name: Octafluorocyclopentene
  - species_key: SF6
    formula: SF6
    display_name: Sulfur hexafluoride
  - species_key: NF3
    formula: NF3
    display_name: Nitrogen trifluoride
  - species_key: Cl2
    formula: Cl2
    display_name: Chlorine
  - species_key: HBr
    formula: HBr
    display_name: Hydrogen bromide
  - species_key: HCl
    formula: HCl
    display_name: Hydrogen chloride
  - species_key: BCl3
    formula: BCl3
    display_name: Boron trichloride
  - species_key: SiH4
    formula: SiH4
    display_name: Silane
  - species_key: NH3
    formula: NH3
    display_name: Ammonia
  - species_key: N2O
    formula: N2O
    display_name: Nitrous oxide
  - species_key: O3
    formula: O3
    display_name: Ozone
  - species_key: SiH2Cl2
    formula: SiH2Cl2
    display_name: Dichlorosilane
  - species_key: SiHCl3
    formula: SiHCl3
    display_name: Trichlorosilane
  - species_key: WF6
    formula: WF6
    display_name: Tungsten hexafluoride
  - species_key: C8H20O4Si
    formula: C8H20O4Si
    display_name: Tetraethyl orthosilicate

projectiles: [e-]

catalog_paths:
  - catalog_00_references.yaml

state_masters:
  - path: state_master_base.yaml
    families:
      [
        core_plasma,
        noble_gas,
        hydrogen,
        oxygen,
        nitrogen,
        hydrocarbon,
        fluorocarbon,
        chlorine,
        bromine,
        boron,
        silicon,
        sulfur,
        tungsten,
        organosilicon,
      ]

excited_state_registry_path: excited_state_registry.yaml

state_filters:
  charge_window_min: -1
  charge_window_max: 1

state_promotions:
  molecular_excited_states:
    enabled: true
    source_systems: [qdb, ideadb, vamdc]
    min_support_score: 0.84
    max_states_per_species: 4
    require_electron_signal: true

template_promotions:
  source_backed_templates:
    enabled: true
    source_systems: [qdb, ideadb, vamdc]
    target_families: [noble_gas, oxygen, nitrogen, hydrocarbon, fluorocarbon, chlorine, bromine, boron, silicon, sulfur, tungsten, organosilicon]
    allowed_reaction_families:
      [
        electron_attachment,
        electron_ionization,
        electron_dissociation,
        charge_transfer,
        radical_neutral_reaction,
        ion_neutral_followup,
        dissociative_recombination,
        mutual_neutralization,
      ]
    min_support_score: 0.84
    max_templates_per_family: 16
    require_catalog_species: true
  molecular_excited_state_templates:
    enabled: true
    source_systems: [qdb, ideadb, vamdc]
    target_families: [hydrocarbon, oxygen, nitrogen, boron, silicon, sulfur, tungsten, organosilicon]
    min_support_score: 0.84
    include_electron_excitation: true
    include_radiative_relaxation: true
    include_collisional_quenching: true
    include_superelastic_deexcitation: true
    quenching_partners:
      hydrocarbon: [CH4, H2]
      oxygen: [O2, N2]
      nitrogen: [N2, O2]
      boron: [BCl3, O2]
      silicon: [SiH2Cl2, SiHCl3, H2]
      sulfur: [SF6, O2]
      tungsten: [WF6, H2]
      organosilicon: [C8H20O4Si, O2, H2]

limits:
  max_generation: 3
  beam_width: 96
  max_species: 240

bootstrap:
  reaction_evidence:
    sources:
      - kind: qdb_snapshot
        path: ../snapshots/qdb_oxygen_argon_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_multi_family_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_halogen_fluorocarbon_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_bromine_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_silicon_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_process_precursor_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_molecular_excited_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_excited_precursor_coupling_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_excited_fluoride_precursor_coupling_snapshot.json
      - kind: vamdc_xsams
        path: ../snapshots/vamdc_ideadb_molecular_excitation_sample.xsams
        source_name: IDEADB molecular excitation sample
        source_system: ideadb
        support_score: 0.86
      - kind: vamdc_xsams
        path: ../snapshots/vamdc_molecular_excitation_sample.xsams
        source_name: VAMDC molecular excitation sample
        source_system: vamdc
        support_score: 0.84
