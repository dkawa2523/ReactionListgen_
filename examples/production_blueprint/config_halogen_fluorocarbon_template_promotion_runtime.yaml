extends: config_focused_runtime_base.yaml

feeds:
  - species_key: CF4
    formula: CF4
    display_name: Tetrafluoromethane
  - species_key: c-C4F8
    formula: C4F8
    display_name: Octafluorocyclobutane
  - species_key: HCl
    formula: HCl
    display_name: Hydrogen chloride
  - species_key: HBr
    formula: HBr
    display_name: Hydrogen bromide

projectiles: [e-]

catalog_paths:
  - catalog_00_references.yaml

state_masters:
  - path: state_master_base.yaml
    families: [core_plasma, fluorocarbon, chlorine, bromine]

state_filters:
  charge_window_min: -1
  charge_window_max: 1

template_promotions:
  source_backed_templates:
    enabled: true
    source_systems: [qdb]
    target_families: [fluorocarbon, chlorine, bromine]
    allowed_reaction_families: [electron_attachment, electron_dissociation, radical_neutral_reaction]
    min_support_score: 0.82
    max_templates_per_family: 6
    require_catalog_species: true

limits:
  max_generation: 3
  beam_width: 48
  max_species: 80

bootstrap:
  reaction_evidence:
    sources:
      - kind: qdb_snapshot
        path: ../snapshots/qdb_halogen_fluorocarbon_template_promotion_snapshot.json
