extends: config_focused_runtime_base.yaml

feeds:
  - species_key: SiH4
    formula: SiH4
    display_name: Silane
  - species_key: SiH2Cl2
    formula: SiH2Cl2
    display_name: Dichlorosilane
  - species_key: SiHCl3
    formula: SiHCl3
    display_name: Trichlorosilane
  - species_key: H2
    formula: H2
    display_name: Hydrogen

projectiles: [e-]

catalog_paths:
  - catalog_00_references.yaml
  - catalog_43_reactions_electron_ionization_gas_phase_targets.yaml
  - catalog_53_reactions_electron_ionization_silicon.yaml
  - catalog_54_reactions_electron_dissociation_silicon.yaml
  - catalog_55_reactions_radical_neutral_reaction_silicon.yaml
  - catalog_58_reactions_ion_neutral_followup_silicon.yaml
  - catalog_59_reactions_dissociative_recombination_silicon.yaml

state_masters:
  - path: state_master_base.yaml
    families: [core_plasma, hydrogen, chlorine, silicon]

excited_state_registry_path: excited_state_registry.yaml

state_promotions:
  molecular_excited_states:
    enabled: true
    source_systems: [qdb]
    min_support_score: 0.84
    max_states_per_species: 2
    require_electron_signal: true

template_promotions:
  source_backed_templates:
    enabled: true
    source_systems: [qdb]
    target_families: [silicon]
    allowed_reaction_families: [electron_dissociation, ion_neutral_followup, dissociative_recombination]
    min_support_score: 0.84
    max_templates_per_family: 8
    require_catalog_species: true
  molecular_excited_state_templates:
    enabled: true
    source_systems: [qdb]
    target_families: [silicon]
    min_support_score: 0.84
    include_electron_excitation: true
    include_radiative_relaxation: true
    include_collisional_quenching: true
    include_superelastic_deexcitation: true
    quenching_partners:
      silicon: [SiH2Cl2, SiHCl3, H2]

limits:
  max_generation: 3
  beam_width: 80
  max_species: 128

bootstrap:
  reaction_evidence:
    sources:
      - kind: qdb_snapshot
        path: ../snapshots/qdb_silicon_template_promotion_snapshot.json
      - kind: qdb_snapshot
        path: ../snapshots/qdb_excited_precursor_coupling_snapshot.json
